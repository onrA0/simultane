<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simultane Çeviri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* iOS ve Android'de tıklama hissiyatı ve metin seçimi engeli */
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden m-0 p-0 h-screen w-screen font-sans">

    <!-- Hata Mesajı Kutusu -->
    <div id="errorBox" class="hidden absolute top-4 left-4 right-4 bg-red-500 text-white p-4 rounded-xl shadow-lg z-50 text-center font-bold transition-all"></div>

    <!-- ADIM 1: Kurulum Ekranı -->
    <div id="step1" class="h-full w-full flex flex-col items-center justify-center p-6 transition-all duration-300">
        <div class="w-full max-w-md bg-slate-800 rounded-3xl p-8 shadow-2xl flex flex-col items-center text-center">
            <div class="bg-blue-500/20 p-4 rounded-full mb-6">
                <!-- Globe Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </div>
            <h1 class="text-3xl font-bold mb-2">Simultane Çeviri</h1>
            <p class="text-slate-400 mb-8">Karşı tarafın dilini seçin. Sistem sırayla dinleyip çevirecektir.</p>
            
            <div class="flex flex-col w-full gap-4 mb-8">
                <button id="btnEn" onclick="selectLang('en-US', 'İngilizce')" class="p-4 rounded-2xl border-2 transition-all border-slate-700 bg-slate-700/50">
                    <div class="text-xl font-semibold">🇬🇧 İngilizce</div>
                </button>
                <button id="btnFr" onclick="selectLang('fr-FR', 'Fransızca')" class="p-4 rounded-2xl border-2 transition-all border-blue-500 bg-blue-500/10">
                    <div class="text-xl font-semibold">🇫🇷 Fransızca</div>
                </button>
            </div>

            <button onclick="startApp()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-blue-500/30 transition-all">
                Başla
            </button>
        </div>
    </div>

    <!-- ADIM 2: Çeviri Ekranı -->
    <div id="step2" class="h-full w-full hidden flex-col transition-all duration-300 relative">
        
        <!-- Karşı Taraf Alanı -->
        <div id="targetArea" onclick="manualSwitchSpeaker(targetLangCode)" class="flex-1 flex flex-col p-6 transition-all relative bg-slate-900 opacity-60">
            <div class="flex items-center gap-2 mb-4 text-rose-400">
                <!-- User Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="targetLabel" class="font-semibold text-lg">Fransızca</span>
                <span id="targetListeningIndicator" class="hidden h-3 w-3 relative ml-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span>
                </span>
            </div>
            
            <div class="flex-1 overflow-y-auto flex flex-col-reverse gap-4 pb-4">
                <div id="targetInterim" class="text-2xl text-slate-300 italic opacity-70"></div>
                <div id="targetHistory" class="flex flex-col gap-4"></div>
            </div>
        </div>

        <!-- Kontrol Paneli -->
        <div class="h-24 bg-slate-950 flex items-center justify-between px-6 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-10">
            <button onclick="quitApp()" class="p-3 bg-slate-800 rounded-full text-slate-400 hover:text-white transition-colors">
                <!-- Power Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
            </button>

            <div class="flex flex-col items-center mt-[-20px]">
                <button id="btnAuto" onclick="toggleAutoMode()" class="w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all bg-slate-700 border-4 border-slate-950 text-slate-400">
                    <!-- Mic Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </button>
                <span id="autoStatusText" class="text-xs font-bold mt-2 text-slate-400 uppercase tracking-wider">
                    OTOMATİK KAPALI
                </span>
            </div>

            <div id="statusIconContainer" class="w-12 flex justify-center text-slate-500">
                <!-- Volume X Icon (Idle) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>
            </div>
        </div>

        <!-- Benim Alanım -->
        <div id="myArea" onclick="manualSwitchSpeaker('tr-TR')" class="flex-1 flex flex-col p-6 transition-all relative bg-slate-900 opacity-60">
            <div class="flex items-center gap-2 mb-4 text-blue-400 justify-end">
                <span id="myListeningIndicator" class="hidden h-3 w-3 relative mr-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                <span class="font-semibold text-lg">Türkçe (Sen)</span>
                <!-- User Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>

            <div class="flex-1 overflow-y-auto flex flex-col-reverse gap-4 pb-4">
                <div id="myInterim" class="text-2xl text-slate-300 italic opacity-70 text-right"></div>
                <div id="myHistory" class="flex flex-col gap-4"></div>
            </div>
        </div>

        <!-- Çeviriliyor Overlay -->
        <div id="overlay" class="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-center justify-center pointer-events-none">
            <div class="bg-slate-800 text-white px-6 py-3 rounded-full flex items-center gap-3 shadow-2xl">
                <!-- Rotate Ccw Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                <span class="font-medium">Çevriliyor...</span>
            </div>
        </div>

    </div>

    <script>
        // API Configuration
        const apiKey = ""; // Canvas ortamında otomatik dolar
        
        // State
        let step = 1;
        let targetLangCode = 'fr-FR';
        let targetLangName = 'Fransızca';
        let isAutoMode = false;
        let activeSpeaker = 'tr-TR'; 
        let status = 'IDLE'; // IDLE, LISTENING, TRANSLATING, SPEAKING
        let interimText = '';
        let chatHistory = [];

        // DOM Elements
        const elStep1 = document.getElementById('step1');
        const elStep2 = document.getElementById('step2');
        const btnEn = document.getElementById('btnEn');
        const btnFr = document.getElementById('btnFr');
        const targetArea = document.getElementById('targetArea');
        const myArea = document.getElementById('myArea');
        const targetLabel = document.getElementById('targetLabel');
        const btnAuto = document.getElementById('btnAuto');
        const autoStatusText = document.getElementById('autoStatusText');
        const statusIconContainer = document.getElementById('statusIconContainer');
        const overlay = document.getElementById('overlay');
        const targetInterim = document.getElementById('targetInterim');
        const myInterim = document.getElementById('myInterim');
        const targetHistory = document.getElementById('targetHistory');
        const myHistory = document.getElementById('myHistory');
        const targetListeningIndicator = document.getElementById('targetListeningIndicator');
        const myListeningIndicator = document.getElementById('myListeningIndicator');

        // Speech Variables
        let recognition = null;
        let synth = window.speechSynthesis;

        // Icons
        const iconRotateCcw = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 animate-spin text-blue-400"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
        const iconVolume2 = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 animate-bounce text-green-400"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
        const iconVolumeX = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></svg>`;

        function showError(msg) {
            const err = document.getElementById('errorBox');
            err.textContent = msg;
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 6000);
        }

        // Initialize Speech Recognition
        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;

                recognition.onresult = (event) => {
                    let currentTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        currentTranscript += event.results[i][0].transcript;
                    }
                    interimText = currentTranscript;
                    renderInterim();
                };

                recognition.onerror = (event) => {
                    console.error("Mikrofon hatası:", event.error);
                    if (event.error === 'not-allowed') {
                        showError("Mikrofon erişimi reddedildi. Lütfen tarayıcı ayarlarından mikrofona izin verin.");
                        setStatus('IDLE');
                        return;
                    }
                    if (event.error === 'no-speech' && isAutoMode && status === 'LISTENING') {
                        setTimeout(() => startListening(activeSpeaker), 500);
                    } else {
                        setStatus('IDLE');
                    }
                };

                recognition.onend = () => {
                    if (status === 'LISTENING') {
                        handleSpeechEnd();
                    }
                };
            } else {
                showError("Tarayıcınız ses tanıma özelliğini desteklemiyor. Lütfen Chrome kullanın.");
            }
        }

        // Translation API
        async function fetchTranslation(text, sourceLang, targetLang, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            const prompt = `Sen profesyonel bir simültane çevirmensin. Sadece sana verilen metni ${sourceLang} dilinden ${targetLang} diline çevir. Asla açıklama, tırnak işareti veya ek bilgi ekleme. Sadece çeviriyi ver.\nÇevrilecek Metin: ${text}`;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    if (!response.ok) throw new Error("API Hatası");
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text.trim();
                } catch (error) {
                    if (i === retries - 1) return "Çeviri yapılamadı.";
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // Logic & State Management
        function selectLang(code, name) {
            targetLangCode = code;
            targetLangName = name;
            updateUI();
        }

        function startApp() {
            step = 2;
            initSpeech();
            updateUI();
        }

        function quitApp() {
            step = 1;
            isAutoMode = false;
            setStatus('IDLE');
            if(recognition) recognition.stop();
            synth.cancel();
            updateUI();
        }

        function setStatus(newStatus) {
            status = newStatus;
            updateUI();
            
            // Eğer otomatik moddaysak ve IDLE'a döndüysek dinlemeyi başlat
            if (isAutoMode && status === 'IDLE') {
                setTimeout(() => startListening(activeSpeaker), 200);
            }
        }

        function toggleAutoMode() {
            if (isAutoMode) {
                isAutoMode = false;
                if(recognition) recognition.stop();
                synth.cancel();
                setStatus('IDLE');
            } else {
                isAutoMode = true;
                activeSpeaker = 'tr-TR'; // Benden başla
                chatHistory = [];
                renderHistory();
                setStatus('IDLE'); // Bu tetikleme otomatik dinlemeyi başlatacak
            }
        }

        function manualSwitchSpeaker(langCode) {
            if (recognition) recognition.stop();
            synth.cancel();
            activeSpeaker = langCode;
            if (!isAutoMode) {
                setTimeout(() => startListening(langCode), 200);
            } else {
                updateUI();
            }
        }

        function startListening(langCode) {
            if (!recognition) return;
            try {
                recognition.lang = langCode;
                recognition.start();
                interimText = '';
                renderInterim();
                status = 'LISTENING'; // doğrudan atayıp UI güncelliyoruz ki döngü olmasın
                updateUI();
            } catch (e) {
                console.log(e);
            }
        }

        async function handleSpeechEnd() {
            status = 'IDLE'; 
            updateUI();

            if (!interimText.trim()) {
                if (isAutoMode) setStatus('IDLE'); // Yeniden dene
                return;
            }

            const textToTranslate = interimText;
            interimText = '';
            renderInterim();
            
            status = 'TRANSLATING';
            updateUI();

            const sourceName = activeSpeaker === 'tr-TR' ? 'Türkçe' : targetLangName;
            const targetName = activeSpeaker === 'tr-TR' ? targetLangName : 'Türkçe';

            const translation = await fetchTranslation(textToTranslate, sourceName, targetName);

            chatHistory.push({
                original: textToTranslate,
                translated: translation,
                speaker: activeSpeaker
            });
            renderHistory();

            speakTranslation(translation, activeSpeaker === 'tr-TR' ? targetLangCode : 'tr-TR');
        }

        function speakTranslation(text, lang) {
            status = 'SPEAKING';
            updateUI();
            synth.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            
            utterance.onend = () => {
                setTimeout(() => {
                    if (isAutoMode) {
                        activeSpeaker = activeSpeaker === 'tr-TR' ? targetLangCode : 'tr-TR';
                    }
                    setStatus('IDLE');
                }, 500);
            };

            utterance.onerror = () => {
                if (isAutoMode) {
                    activeSpeaker = activeSpeaker === 'tr-TR' ? targetLangCode : 'tr-TR';
                }
                setStatus('IDLE');
            };

            synth.speak(utterance);
        }

        // UI Renders
        function renderInterim() {
            if (activeSpeaker === targetLangCode) {
                targetInterim.textContent = interimText;
                myInterim.textContent = '';
            } else {
                myInterim.textContent = interimText;
                targetInterim.textContent = '';
            }
        }

        function renderHistory() {
            targetHistory.innerHTML = '';
            const targetMsgs = chatHistory.filter(m => m.speaker === targetLangCode).reverse();
            targetMsgs.forEach(msg => {
                targetHistory.innerHTML += `<div class="flex flex-col gap-1"><span class="text-xl font-medium text-white">${msg.original}</span><span class="text-rose-300">${msg.translated}</span></div>`;
            });

            myHistory.innerHTML = '';
            const myMsgs = chatHistory.filter(m => m.speaker === 'tr-TR').reverse();
            myMsgs.forEach(msg => {
                myHistory.innerHTML += `<div class="flex flex-col gap-1 text-right"><span class="text-xl font-medium text-white">${msg.original}</span><span class="text-blue-300">${msg.translated}</span></div>`;
            });
        }

        function updateUI() {
            // Screen switching
            if (step === 1) {
                elStep1.classList.remove('hidden'); elStep1.classList.add('flex');
                elStep2.classList.add('hidden'); elStep2.classList.remove('flex');
                
                if(targetLangCode === 'en-US') {
                    btnEn.className = "p-4 rounded-2xl border-2 transition-all border-blue-500 bg-blue-500/10";
                    btnFr.className = "p-4 rounded-2xl border-2 transition-all border-slate-700 bg-slate-700/50";
                } else {
                    btnFr.className = "p-4 rounded-2xl border-2 transition-all border-blue-500 bg-blue-500/10";
                    btnEn.className = "p-4 rounded-2xl border-2 transition-all border-slate-700 bg-slate-700/50";
                }
                return;
            } else {
                elStep1.classList.add('hidden'); elStep1.classList.remove('flex');
                elStep2.classList.remove('hidden'); elStep2.classList.add('flex');
            }

            targetLabel.textContent = targetLangName;

            // Area highlights
            if (activeSpeaker === targetLangCode) {
                targetArea.className = `flex-1 flex flex-col p-6 transition-all relative bg-slate-800/80 ${status === 'LISTENING' ? 'ring-inset ring-4 ring-rose-500/50' : ''}`;
                myArea.className = `flex-1 flex flex-col p-6 transition-all relative bg-slate-900 opacity-60`;
                targetListeningIndicator.classList.toggle('hidden', status !== 'LISTENING');
                myListeningIndicator.classList.add('hidden');
            } else {
                myArea.className = `flex-1 flex flex-col p-6 transition-all relative bg-blue-900/40 ${status === 'LISTENING' ? 'ring-inset ring-4 ring-blue-500/50' : ''}`;
                targetArea.className = `flex-1 flex flex-col p-6 transition-all relative bg-slate-900 opacity-60`;
                myListeningIndicator.classList.toggle('hidden', status !== 'LISTENING');
                targetListeningIndicator.classList.add('hidden');
            }

            // Auto Mode Button
            if (isAutoMode) {
                btnAuto.className = 'w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all bg-green-500 shadow-green-500/40 animate-pulse text-white border-4 border-slate-950 z-20';
                autoStatusText.textContent = 'OTOMATİK AÇIK';
                autoStatusText.classList.replace('text-slate-400', 'text-green-400');
            } else {
                btnAuto.className = 'w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all bg-slate-700 text-slate-400 border-4 border-slate-950 z-20';
                autoStatusText.textContent = 'OTOMATİK KAPALI';
                autoStatusText.classList.replace('text-green-400', 'text-slate-400');
            }

            // Status Icon
            if (status === 'TRANSLATING') statusIconContainer.innerHTML = iconRotateCcw;
            else if (status === 'SPEAKING') statusIconContainer.innerHTML = iconVolume2;
            else statusIconContainer.innerHTML = iconVolumeX;

            // Overlay
            if (status === 'TRANSLATING') {
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }
        
        // Initial setup
        updateUI();
    </script>
</body>
</html>
